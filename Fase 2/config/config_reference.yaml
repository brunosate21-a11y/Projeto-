solver: cplex
media: M9


mags_dir:    "data/mags"
results_dir: "results"
logs_dir:    "logs"

checkm_report: null     
abundances:    null     

quality_filters:
  checkm:
    min_completeness: 50.0
    max_contamination: 10.0
  memote:
    min_total_score: 0.4

checkm:
  data_path: "~/checkm_data"

sensitivity_analysis:
  checkm:
    min_completeness:  [50, 60, 70, 80, 90]
    max_contamination: [5, 10, 15, 20]
  memote:
    min_total_score:   [0.3, 0.4, 0.5, 0.6, 0.7]
