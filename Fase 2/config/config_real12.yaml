solver: cplex
media: M9
mags_dir:    "data/real/proteins"
results_dir: "results/real12"
logs_dir:    "logs/real12"
sample_sheet: "data/real/samples_top12.tsv"
checkm_report: "data/real/metadata/checkm_quality.tsv"
abundances:    "data/real/metadata/abundances.tsv"
quality_filters:
  checkm:
    min_completeness: 50.0
    max_contamination: 15.0
  memote:
    min_total_score: 0.4
checkm:
  data_path: "~/checkm_data"
sensitivity_analysis:
  checkm:
    min_completeness:  [50, 60, 70, 80, 90]
    max_contamination: [5, 10, 15, 20]
  memote:
    min_total_score:   [0.3, 0.4, 0.5, 0.6, 0.7]
